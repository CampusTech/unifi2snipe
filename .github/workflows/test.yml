name: Test

on:
  pull_request:
  push:
    branches: [main]

env:
  GONOSUMCHECK: github.com/CampusTech/go-snipeit
  GONOSUMDB: github.com/CampusTech/go-snipeit
  GOPRIVATE: github.com/CampusTech/go-snipeit

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      group: test-${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Configure Git for private modules
        run: git config --global url."https://${{ github.token }}@github.com/".insteadOf "https://github.com/"

      - name: Build
        run: go build ./...

      - name: Test
        run: go test -race -v ./...
