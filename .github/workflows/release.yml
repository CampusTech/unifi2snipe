name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v1.2.3)"
        required: true

permissions:
  contents: write

env:
  GONOSUMCHECK: github.com/CampusTech/go-snipeit
  GONOSUMDB: github.com/CampusTech/go-snipeit
  GOPRIVATE: github.com/CampusTech/go-snipeit

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Configure Git for private modules
        run: git config --global url."https://${{ github.token }}@github.com/".insteadOf "https://github.com/"

      - name: Build binaries
        run: |
          VERSION="${{ github.event.inputs.tag || github.ref_name }}"
          LDFLAGS="-s -w -X main.version=${VERSION}"
          GOOS=darwin  GOARCH=arm64 go build -ldflags "${LDFLAGS}" -o "dist/unifi2snipe-darwin-arm64"   .
          GOOS=linux   GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o "dist/unifi2snipe-linux-amd64"    .
          GOOS=linux   GOARCH=arm64 go build -ldflags "${LDFLAGS}" -o "dist/unifi2snipe-linux-arm64"    .
          GOOS=windows GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o "dist/unifi2snipe-windows-amd64.exe" .

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          generate_release_notes: true
          files: dist/*
